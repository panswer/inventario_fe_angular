<div class="scanner-modal-overlay">
  <div class="scanner-modal">
    <div class="modal-header">
      <h3>Escanear Código de Barras</h3>
      <button type="button" class="close-btn" (click)="closeModal()">✕</button>
    </div>

    <div class="format-selector">
      <label for="barcodeFormat">Tipo de código:</label>
      <select 
        id="barcodeFormat" 
        [value]="selectedFormat"
        (change)="onFormatChange($event)"
      >
        @for (format of barcodeFormats; track format.value) {
          <option [value]="format.value">{{ format.label }}</option>
        }
      </select>
    </div>
    
    <div class="video-container">
      @if (isLoading) {
        <div class="loading-message">
          <p>Inicializando cámara...</p>
        </div>
      }
      
      <div #scannerContainer class="scanner-target"></div>
    </div>

    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }

    @if (isCameraActive) {
      <div class="instructions">
        <p>Posicione el código de barras dentro del marco</p>
        <p class="hint">El escaneo es automático</p>
      </div>
    }
  </div>
</div>
