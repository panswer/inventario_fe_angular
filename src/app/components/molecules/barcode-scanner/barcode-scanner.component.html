<div class="scanner-overlay" *ngIf="isScanning">
  <div class="scanner-modal">
    <div class="scanner-header">
      <h3>Escanear Código de Barras</h3>
      <button class="close-btn" (click)="close()">✕</button>
    </div>
    
    <div class="scanner-content">
      @if (isInitializing) {
        <div class="loading-message">
          <p>Inicializando cámara...</p>
        </div>
      }
      
      <div [id]="containerId" class="scanner-container"></div>
      
      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }
      
      @if (!errorMessage && !isInitializing) {
        <div class="scanner-instructions">
          <p>Coloque el código de barras dentro del marco</p>
          <p class="hint">Si no funciona, verifique que la cámara no esté siendo usada por otra app</p>
        </div>
      }
    </div>
  </div>
</div>
