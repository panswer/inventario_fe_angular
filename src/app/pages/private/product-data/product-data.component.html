<div
  class="grid grid-cols-1 h-full content-center justify-items-center dark:text-blue-500/80 gap-4"
>
  <form
    class="flex flex-col border-2 rounded-md border-indigo-500 p-5"
    [formGroup]="productForm"
  >
    <label for="name">Nombre</label>
    <input
      type="text"
      name="name"
      id="name"
      formControlName="name"
      class="border-2 border-indigo-500 rounded-md"
      [disabled]="isLoading"
    />

    <label for="inStock" class="inStock">Mostrar</label>
    <input
      type="checkbox"
      name="inStock"
      id="inStock"
      formControlName="inStock"
      [disabled]="isLoading"
    />

    <label for="image">imagen (opcional)</label>
    <input
      type="file"
      name="image"
      id="image"
      accept="image/jpeg,image/jpg,image/svg+xml"
      (change)="handlerFileSelect($event)"
      class="border-2 border-indigo-500 rounded-md"
      [disabled]="isLoading"
    />

    @if (imagePreview) {
      <img [src]="imagePreview" alt="Preview" class="w-32 h-32 object-cover mt-2" />
    }

    <div class="flex justify-end">
      <app-button
        [disable]="productForm.status === 'INVALID' || isLoading"
        (clickEvent)="handlerSubmitProduct()"
      >
        Guardar
      </app-button>
    </div>
  </form>

  <form
    class="flex flex-col border-2 rounded-md border-indigo-500 p-5"
    [formGroup]="priceForm"
  >
    <label for="amount">Precio</label>
    <input
      type="number"
      name="amount"
      id="amount"
      class="border-2 border-indigo-500 rounded-md"
      formControlName="amount"
      [disabled]="isLoading"
    />

    <div class="flex justify-between">
      <app-button (clickEvent)="goBack()">Regresar</app-button>
      <app-button
        [disable]="priceForm.status === 'INVALID' || isLoading"
        (clickEvent)="handlerSubmitPrice()"
        >Guarda</app-button
      >
    </div>
  </form>

  @if (stock) {
    <form
      class="flex flex-col border-2 rounded-md border-indigo-500 p-5"
    >
      <div class="flex flex-col">
        <span class="font-bold">Almacén:</span>
        <span>{{ stock.warehouseId?.name }}</span>
      </div>

      <div class="flex flex-col">
        <span class="font-bold">Cantidad actual:</span>
        <span [class.text-red-500]="stock.quantity < stock.minQuantity">
          {{ stock.quantity }}
        </span>
      </div>

      <div class="border-t border-indigo-500 pt-4 mt-4">
        <span class="font-bold">Editar cantidad mínima:</span>
        <form [formGroup]="minQuantityForm" class="flex gap-2 mt-2">
          <input
            type="number"
            formControlName="minQuantity"
            class="border-2 border-indigo-500 rounded-md p-1 w-20"
            min="0"
          />
          <app-button
            [disable]="minQuantityForm.status === 'INVALID' || isUpdatingStock"
            (clickEvent)="handlerUpdateMinQuantity()"
          >
            Guardar
          </app-button>
        </form>
      </div>

      <div class="border-t border-indigo-500 pt-4 mt-4">
        <span class="font-bold">Agregar stock:</span>
        <form class="flex gap-2 mt-2">
          <input
            type="number"
            [formControl]="stockAmountForm.controls.amount"
            class="border-2 border-indigo-500 rounded-md p-1 w-20"
            min="1"
          />
          <app-button
            [disable]="stockAmountForm.status === 'INVALID' || isUpdatingStock"
            (clickEvent)="handlerAddStock()"
          >
            Agregar
          </app-button>
        </form>
      </div>

      <div class="border-t border-indigo-500 pt-4 mt-4">
        <span class="font-bold">Quitar stock:</span>
        <form class="flex gap-2 mt-2">
          <input
            type="number"
            [formControl]="stockAmountForm.controls.amount"
            class="border-2 border-indigo-500 rounded-md p-1 w-20"
            min="1"
          />
          <app-button
            [disable]="stockAmountForm.status === 'INVALID' || isUpdatingStock"
            (clickEvent)="handlerRemoveStock()"
          >
            Quitar
          </app-button>
        </form>
      </div>
    </form>
  }
</div>
