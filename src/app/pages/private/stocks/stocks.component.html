<div class="flex h-full justify-center pt-5">
  <div class="flex flex-col items-end">
    <div class="pb-2">
      <app-button class="pr-2" (clickEvent)="goToProducts()">Productos</app-button>
      <app-button class="pr-2" (clickEvent)="goToSellers()">Ventas</app-button>
      <app-button class="pr-2" (clickEvent)="goToAddStock()">Agregar Stock</app-button>
      <app-button (clickEvent)="goToTransfer()">Transferir</app-button>
    </div>
    <app-table [cols]="tableField" [rows]="stocks" [total]="stockTotal">
      <ng-template appTableBodyCell let-element let-key="key">
        <ng-container [ngSwitch]="key">
          <ng-container *ngSwitchCase="'quantity'">
            <span [class.text-red-500]="element['quantity'] < element['minQuantity']">
              {{ element['quantity'] }}
            </span>
          </ng-container>
          <ng-container *ngSwitchCase="'actions'">
            <app-button (clickEvent)="goToStockDetail(element['_id'])">Ver</app-button>
          </ng-container>

          <ng-container *ngSwitchDefault>
            <span>{{ getNestedValue(element, key) }}</span>
          </ng-container>
        </ng-container>
      </ng-template>
    </app-table>
  </div>
</div>
