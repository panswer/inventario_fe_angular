<div class="flex h-full justify-center pt-5">
  <div class="flex flex-col items-end">
    <div class="pb-4 flex items-center gap-2">
      <app-button (clickEvent)="goBack()">
        <fa-icon [icon]="icon.arrowLeft"></fa-icon>
      </app-button>
      <fa-icon [icon]="icon.userShield" class="text-xl"></fa-icon>
      <span class="text-xl font-semibold">Gestión de Usuarios</span>
    </div>

    <app-table [cols]="tableField" [total]="users.length" [rows]="users">
      <ng-template appTableBodyCell let-element let-key="key">
        <ng-container [ngSwitch]="key">
          <ng-container *ngSwitchCase="'role'">
            <div *ngIf="editingUserId !== element._id" class="flex items-center gap-2">
              <span [ngClass]="{
                'bg-red-100 text-red-800': element.role === 'admin',
                'bg-blue-100 text-blue-800': element.role === 'manager',
                'bg-yellow-100 text-yellow-800': element.role === 'cashier',
                'bg-gray-100 text-gray-800': element.role === 'user'
              }" class="px-2 py-1 rounded text-xs font-medium">
                {{ getRoleLabel(element.role) }}
              </span>
              <button (click)="editRole(element)" class="text-blue-600 hover:text-blue-800">
                <fa-icon [icon]="icon.pen"></fa-icon>
              </button>
            </div>
            <div *ngIf="editingUserId === element._id" class="flex items-center gap-2">
              <select [(ngModel)]="selectedRole" class="border rounded px-2 py-1 text-sm">
                <option *ngFor="let role of roles" [value]="role">{{ getRoleLabel(role) }}</option>
              </select>
              <button (click)="saveRole(element._id)" class="text-green-600 hover:text-green-800 text-sm font-medium">
                Guardar
              </button>
              <button (click)="cancelEdit()" class="text-red-600 hover:text-red-800 text-sm">
                Cancelar
              </button>
            </div>
          </ng-container>

          <ng-container *ngSwitchCase="'createdAt'">
            {{ element[key] | date : "YYYY-MM-dd HH:mm:ss" }}
          </ng-container>

          <ng-container *ngSwitchDefault>
            {{ element[key] }}
          </ng-container>
        </ng-container>
      </ng-template>
    </app-table>
  </div>
</div>
