<div class="flex h-full justify-center pt-5">
  <div class="transfer-card">
    <h2 class="page-title">Transferir Stock</h2>

    <form [formGroup]="transferForm" class="transfer-form">
      <div class="form-group">
        <label for="productId" class="form-label">Producto</label>
        <select id="productId" formControlName="productId" (change)="onProductChange()" class="form-select">
          <option value="">Seleccione un producto</option>
          @for (product of products; track product._id) {
            <option [value]="product._id">
              {{ product.name }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="fromWarehouseId" class="form-label">Almacén Origen</label>
        <select id="fromWarehouseId" formControlName="fromWarehouseId" (change)="onSourceWarehouseChange()" class="form-select">
          <option value="">Seleccione un almacén</option>
          @for (stock of stocksByProduct; track stock.warehouseId) {
            <option [value]="stock.warehouseId">
              {{ stock.warehouseName }} (Stock: {{ stock.quantity }})
            </option>
          }
        </select>
        @if (availableStock > 0) {
          <div class="stock-badge">
            <span class="stock-label">Disponible:</span>
            <span class="stock-value">{{ availableStock }}</span>
          </div>
        }
      </div>

      <div class="form-group">
        <label for="toWarehouseId" class="form-label">Almacén Destino</label>
        <select id="toWarehouseId" formControlName="toWarehouseId" class="form-select">
          <option value="">Seleccione un almacén</option>
          @for (warehouse of warehouses; track warehouse._id) {
            <option [value]="warehouse._id">
              {{ warehouse.name }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="quantity" class="form-label">Cantidad</label>
        <input
          type="number"
          id="quantity"
          formControlName="quantity"
          min="1"
          [max]="availableStock"
          class="form-input"
          placeholder="Ingrese la cantidad"
        />
        @if (transferForm.get('quantity')?.errors?.['max']) {
          <div class="error-text">
            La cantidad no puede exceder el stock disponible ({{ availableStock }})
          </div>
        }
      </div>

      <div class="button-group">
        <app-button (clickEvent)="onSubmit()" [disabled]="isLoading">
          @if (isLoading) {
            Transferiendo...
          } @else {
            Transferir
          }
        </app-button>
        <app-button (clickEvent)="goBack()" variant="secondary">Cancelar</app-button>
      </div>
    </form>
  </div>
</div>
