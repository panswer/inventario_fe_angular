<div
  class="grid grid-cols-1 h-full content-center justify-items-center dark:text-blue-500/80"
>
  <form
    class="flex flex-col border-2 rounded-md border-indigo-500 p-5"
    [formGroup]="productForm"
    (submit)="handlerPreventEvent($event)"
  >
    <label for="name">nombre</label>
    <input
      type="text"
      name="name"
      id="name"
      class="border-2 border-indigo-500 rounded-md"
      formControlName="name"
    />

    <label for="barcode">código de barras (opcional)</label>
    <div class="flex gap-2">
      <input
        type="text"
        name="barcode"
        id="barcode"
        class="border-2 border-indigo-500 rounded-md flex-1"
        formControlName="barcode"
      />
      <button
        type="button"
        class="px-3 py-2 bg-indigo-500 text-white rounded-md hover:bg-indigo-600"
        (click)="startBarcodeScanner()"
      >
        📷
      </button>
    </div>

    <label for="amount">precio</label
    ><input
      type="number"
      name="amount"
      id="amount"
      class="border-2 border-indigo-500 rounded-md"
      formControlName="amount"
    />

    <label for="coin">moneda</label>
    <select
      name="coin"
      id="coin"
      formControlName="coin"
      class="border-2 border-indigo-500 rounded-md"
    >
      @for (coinType of coinList; track coinType) {
        <option [value]="coinType">
          {{coinType}}
        </option>
      }
    </select>

    <label for="categories">categorías (opcional)</label>
    <div class="categories-list max-h-32 overflow-y-auto border-2 border-indigo-500 rounded-md p-2">
      @for (category of categoryList; track category._id) {
        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            [id]="'cat-' + category._id"
            [checked]="isCategorySelected(category._id)"
            (change)="toggleCategory(category._id)"
          />
          <label [for]="'cat-' + category._id">{{ category.name }}</label>
        </div>
      }
    </div>

    <label for="image">imagen (opcional)</label>
    <input
      type="file"
      name="image"
      id="image"
      accept="image/jpeg,image/jpg,image/svg+xml"
      (change)="handlerFileSelect($event)"
      class="border-2 border-indigo-500 rounded-md"
    />

    @if (imagePreview) {
      <img [src]="imagePreview" alt="Preview" class="w-32 h-32 object-cover mt-2" />
    }

    <div class="flex justify-around">
      <app-button (clickEvent)="goBack()">regresar</app-button>
      <app-button
        [disable]="productForm.status === 'INVALID' || isLoading"
        (clickEvent)="handlerSubmit()"
        >crear</app-button
      >
    </div>
  </form>
</div>

@if (isScanningBarcode) {
  <app-barcode-scanner
    [isScanning]="isScanningBarcode"
    (barcodeScanned)="onBarcodeScanned($event)"
    (closeScanner)="closeBarcodeScanner()"
  ></app-barcode-scanner>
}
