<div class="flex h-full justify-center pt-5">
  <div class="reports-card">
    <div class="header-row">
      <app-button (clickEvent)="goBack()" variant="secondary">
        <fa-icon [icon]="faArrowLeft"></fa-icon>
        Regresar
      </app-button>
    </div>

    <div class="tabs">
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'movements'"
        (click)="setActiveTab('movements')"
      >
        Historial
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'summary'"
        (click)="setActiveTab('summary')"
      >
        Resumen
      </button>
      <button
        type="button"
        class="tab-btn"
        [class.active]="activeTab === 'transfers'"
        (click)="setActiveTab('transfers')"
      >
        Transferencias
      </button>
    </div>

    <form [formGroup]="reportForm" class="report-form">
      <div class="form-group">
        <label for="productId" class="form-label">Producto</label>
        <select
          id="productId"
          formControlName="productId"
          class="form-select"
        >
          <option value="">Todos los productos</option>
          @for (product of products; track product._id) {
            <option [value]="product._id">
              {{ product.name }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label for="warehouseId" class="form-label">Almacén</label>
        <select
          id="warehouseId"
          formControlName="warehouseId"
          class="form-select"
        >
          <option value="">Todos los almacenes</option>
          @for (warehouse of warehouses; track warehouse._id) {
            <option [value]="warehouse._id">
              {{ warehouse.name }}
            </option>
          }
        </select>
      </div>

      @if (activeTab === 'movements') {
        <div class="form-group">
          <label for="type" class="form-label">Tipo de movimiento</label>
          <select
            id="type"
            formControlName="type"
            class="form-select"
          >
            @for (type of movementTypes; track type.value) {
              <option [value]="type.value">{{ type.label }}</option>
            }
          </select>
        </div>
      }

      <div class="date-range">
        <div class="form-group">
          <label for="startDate" class="form-label">Fecha inicio</label>
          <input
            type="date"
            id="startDate"
            formControlName="startDate"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="endDate" class="form-label">Fecha fin</label>
          <input
            type="date"
            id="endDate"
            formControlName="endDate"
            class="form-input"
          />
        </div>
      </div>

      <div class="action-section">
        @if (isLoading) {
          <div class="loading-indicator">
            <span class="loading-text">Generando reporte...</span>
          </div>
        } @else {
          <app-button (clickEvent)="exportReport()">
            <fa-icon [icon]="faFileExcel"></fa-icon>
            Exportar a Excel
          </app-button>
        }
      </div>
    </form>
  </div>
</div>
